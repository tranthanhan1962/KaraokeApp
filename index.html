<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>G-PRO KARAOKE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .pro-card { background: rgba(30, 41, 59, 0.7); border: 1px solid rgba(255,255,255,0.1); }
        .mic-active { animation: pulse 1.5s infinite; color: #ef4444; }
        @keyframes pulse { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.1); } 100% { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="min-h-screen p-4 pb-24">

    <div id="main-ui" class="max-w-sm mx-auto w-full space-y-6">
        <div class="text-center pt-4">
            <h1 class="text-xl font-bold text-white tracking-tight">G-PRO KARAOKE</h1>
            <p class="text-[10px] text-gray-500 uppercase tracking-widest mt-1">Danh sách chờ cá nhân</p>
        </div>
        
        <!-- Input & Mic Area -->
        <div class="pro-card p-4 rounded-2xl">
            <div class="flex gap-2">
                <input id="song-input" type="text" placeholder="Nhập tên bài hát..." 
                    class="flex-1 bg-slate-950 border border-slate-700 p-3 rounded-xl text-white placeholder-gray-600 focus:border-purple-500 outline-none transition-all">
                <button id="mic-btn" onclick="startRecognition()" class="bg-slate-700 hover:bg-slate-600 px-4 rounded-xl text-xl transition-all">🎤</button>
            </div>
            <button onclick="addSong()" 
                class="w-full mt-3 bg-purple-600 hover:bg-purple-500 p-3 rounded-xl font-bold text-sm transition-all shadow-lg active:scale-95">
                THÊM VÀO LIST
            </button>
            <div id="error-msg" class="text-red-400 text-[10px] mt-2 text-center hidden"></div>
        </div>

        <!-- Song Queue List -->
        <div id="song-list" class="space-y-2">
            <!-- List items will be rendered here -->
        </div>
    </div>

    <script>
        let songList = [];
        const errorEl = document.getElementById('error-msg');
        
        // Khởi tạo nhận diện giọng nói
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = SpeechRecognition ? new SpeechRecognition() : null;

        if (recognition) {
            recognition.lang = 'vi-VN';
            recognition.continuous = false;

            recognition.onstart = () => {
                document.getElementById('mic-btn').classList.add('mic-active');
                errorEl.classList.add('hidden');
            };

            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                document.getElementById('song-input').value = transcript;
                document.getElementById('mic-btn').classList.remove('mic-active');
            };

            recognition.onerror = (event) => {
                console.error("Speech Recognition Error:", event.error);
                document.getElementById('mic-btn').classList.remove('mic-active');
                errorEl.innerText = "Lỗi mic: " + event.error + ". Hãy cấp quyền Micro trong trình duyệt.";
                errorEl.classList.remove('hidden');
            };

            recognition.onend = () => {
                document.getElementById('mic-btn').classList.remove('mic-active');
            };
        }

        function startRecognition() {
            if (!recognition) {
                errorEl.innerText = "Trình duyệt không hỗ trợ nhận diện giọng nói.";
                errorEl.classList.remove('hidden');
                return;
            }
            try {
                recognition.start();
            } catch (e) {
                errorEl.innerText = "Đã có lỗi. Hãy kiểm tra quyền truy cập Micro.";
                errorEl.classList.remove('hidden');
            }
        }

        function addSong() {
            const input = document.getElementById('song-input');
            const songName = input.value.trim();
            if (!songName) return;
            
            songList.push(songName);
            input.value = '';
            renderList();
        }

        function removeSong(index) {
            songList.splice(index, 1);
            renderList();
        }

        function renderList() {
            const listEl = document.getElementById('song-list');
            listEl.innerHTML = songList.map((song, index) => `
                <div class="pro-card p-4 rounded-xl flex justify-between items-center group animate-in fade-in slide-in-from-bottom-2 duration-300">
                    <span class="text-sm font-medium text-gray-200 truncate pr-2">${song}</span>
                    <div class="flex gap-2">
                        <button onclick="playSong(${index})" class="bg-emerald-600 hover:bg-emerald-500 px-4 py-2 rounded-lg text-[10px] font-bold text-white shadow-md active:scale-95">HÁT</button>
                        <button onclick="removeSong(${index})" class="text-slate-500 hover:text-red-500 px-2 py-2 rounded-lg text-xs font-bold transition-all">✕</button>
                    </div>
                </div>
            `).join('');
        }

        function playSong(index) {
            const song = songList[index];
            const query = encodeURIComponent(song + " karaoke");
            // Mở link tìm kiếm trực tiếp trên YouTube
            window.open(`https://www.youtube.com/results?search_query=${query}`, '_blank');
        }
    </script>
</body>
</html>
